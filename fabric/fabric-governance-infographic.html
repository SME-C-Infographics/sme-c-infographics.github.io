<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft Fabric Governance Framework</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #0078D4;
    --dark: #001A33;
    --darker: #000D1A;
    --mid: #003566;
    --light-blue: #DEECF9;
    --accent: #50E6FF;
    --white: #FFFFFF;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-300: #D1D5DB;
    --gray-500: #6B7280;
    --green: #10B981;
    --amber: #F59E0B;
    --red: #EF4444;
    --radius: 12px;
  }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--darker);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    text-align: center;
    padding: 48px 24px 24px;
  }
  .header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: var(--gray-300);
    margin-top: 8px;
    font-size: 1.05rem;
  }

  .wheel-section {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 32px 24px 48px;
  }
  .wheel-container {
    position: relative;
    width: 600px;
    height: 600px;
  }

  .hub {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 170px; height: 170px;
    background: radial-gradient(circle, var(--mid), var(--dark));
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 3px solid var(--blue);
    box-shadow: 0 0 40px rgba(0,120,212,0.3);
    z-index: 10;
    text-align: center;
  }
  .hub-icon { font-size: 2rem; margin-bottom: 4px; }
  .hub-title { font-size: 0.85rem; font-weight: 700; line-height: 1.2; }
  .hub-sub { font-size: 0.65rem; color: var(--gray-300); margin-top: 2px; }

  .domain-node {
    position: absolute;
    width: 130px; height: 130px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 2px solid transparent;
    z-index: 5;
  }
  .domain-node:hover {
    transform: translate(-50%, -50%) scale(1.12);
    border-color: var(--accent);
    box-shadow: 0 0 25px rgba(80, 230, 255, 0.3);
  }
  .domain-node.active {
    transform: translate(-50%, -50%) scale(1.15);
    border-color: var(--accent);
    box-shadow: 0 0 35px rgba(80, 230, 255, 0.45);
  }
  .domain-icon { font-size: 1.6rem; margin-bottom: 4px; }
  .domain-name { font-size: 0.7rem; font-weight: 600; line-height: 1.2; padding: 0 6px; }

  .connectors {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  .connector-line {
    stroke: var(--blue);
    stroke-width: 1.5;
    stroke-dasharray: 6 4;
    opacity: 0.4;
    transition: opacity 0.3s, stroke 0.3s;
  }
  .connector-line.active {
    stroke: var(--accent);
    opacity: 0.8;
    stroke-dasharray: none;
    stroke-width: 2;
  }

  /* Detail Panel */
  .detail-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    justify-content: center;
    align-items: center;
    padding: 24px;
    animation: fadeIn 0.2s ease;
  }
  .detail-overlay.open { display: flex; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .detail-panel {
    background: linear-gradient(180deg, var(--dark), var(--darker));
    border: 1px solid rgba(0,120,212,0.3);
    border-radius: var(--radius);
    max-width: 820px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 36px;
    animation: slideUp 0.3s ease;
    position: relative;
  }
  .detail-panel::-webkit-scrollbar { width: 6px; }
  .detail-panel::-webkit-scrollbar-track { background: transparent; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 3px; }

  .panel-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none; border: none;
    color: var(--gray-300);
    font-size: 1.5rem;
    cursor: pointer;
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .panel-close:hover { background: rgba(255,255,255,0.1); color: var(--white); }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .panel-icon-wrap {
    width: 56px; height: 56px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    flex-shrink: 0;
  }
  .panel-title { font-size: 1.5rem; font-weight: 700; }
  .panel-desc { font-size: 0.9rem; color: var(--gray-300); margin-top: 4px; line-height: 1.5; }

  .section-title {
    font-size: 0.75rem;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* What Good Looks Like */
  .good-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 28px; }
  .good-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    background: rgba(16,185,129,0.06);
    border-radius: 8px;
    border-left: 3px solid var(--green);
    font-size: 0.88rem;
    line-height: 1.4;
  }
  .good-check { color: var(--green); flex-shrink: 0; font-size: 0.9rem; }

  /* Common Pitfalls */
  .pitfall-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .pitfall-item {
    padding: 14px 16px;
    background: rgba(239,68,68,0.06);
    border-radius: 8px;
    border-left: 3px solid var(--red);
  }
  .pitfall-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: #FCA5A5;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .pitfall-desc { font-size: 0.82rem; color: var(--gray-300); line-height: 1.5; }

  /* Best Practices */
  .bp-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .bp-item {
    padding: 14px 16px;
    background: rgba(0,120,212,0.08);
    border-radius: 8px;
    border: 1px solid rgba(0,120,212,0.15);
  }
  .bp-title { font-size: 0.85rem; font-weight: 700; color: var(--light-blue); margin-bottom: 4px; }
  .bp-desc { font-size: 0.82rem; color: var(--gray-300); line-height: 1.5; }

  /* Learn More */
  .learn-more {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    background: var(--blue);
    color: var(--white);
    border-radius: 8px;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    transition: background 0.2s;
  }
  .learn-more:hover { background: #006CBE; }

  .footer {
    text-align: center;
    padding: 32px 24px 48px;
    color: var(--gray-500);
    font-size: 0.8rem;
  }
  .footer a { color: var(--blue); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  @media (max-width: 700px) {
    .wheel-container { width: 340px; height: 340px; }
    .hub { width: 100px; height: 100px; }
    .hub-icon { font-size: 1.2rem; }
    .hub-title { font-size: 0.6rem; }
    .hub-sub { display: none; }
    .domain-node { width: 80px; height: 80px; }
    .domain-icon { font-size: 1rem; }
    .domain-name { font-size: 0.55rem; }
    .header h1 { font-size: 1.5rem; }
    .detail-panel { padding: 24px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Microsoft Fabric Governance Framework</h1>
  <p>7 Domains of Governance — Click a domain to explore best practices & common pitfalls</p>
</div>

<div class="wheel-section">
  <div class="wheel-container" id="wheel">
    <svg class="connectors" id="connectors"></svg>
    <div class="hub">
      <div class="hub-icon">&#x2B21;</div>
      <div class="hub-title">Fabric<br>Governance</div>
      <div class="hub-sub">7 Domains</div>
    </div>
  </div>
</div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<div class="footer">

</div>

// Wheel positioning
const wheel = document.getElementById("wheel");
const svgNS = "http://www.w3.org/2000/svg";
const connectorsSvg = document.getElementById("connectors");
const radius = 220;

function positionNodes() {
  const w = wheel.offsetWidth;
  const scale = w / 600;
  const r = radius * scale;
  const cx = w / 2;
  const cy = wheel.offsetHeight / 2;

  connectorsSvg.innerHTML = "";
  connectorsSvg.setAttribute("viewBox", `0 0 ${w} ${wheel.offsetHeight}`);

  DOMAINS.forEach((d, i) => {
    const angle = (i / DOMAINS.length) * 2 * Math.PI - Math.PI / 2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);

    const node = document.getElementById(`node-${d.id}`);
    if (node) {
      node.style.left = `${x}px`;
      node.style.top = `${y}px`;
      node.style.transform = "translate(-50%, -50%)";
      node.style.background = `radial-gradient(circle at 30% 30%, ${d.color}40, ${d.color}15)`;
    }

    const line = document.createElementNS(svgNS, "line");
    line.setAttribute("x1", cx);
    line.setAttribute("y1", cy);
    line.setAttribute("x2", x);
    line.setAttribute("y2", y);
    line.setAttribute("class", "connector-line");
    line.setAttribute("data-domain", d.id);
    connectorsSvg.appendChild(line);
  });
}

// Create nodes
DOMAINS.forEach((d) => {
  const node = document.createElement("div");
  node.className = "domain-node";
  node.id = `node-${d.id}`;
  node.innerHTML = `
    <div class="domain-icon">${d.icon}</div>
    <div class="domain-name">${d.name.replace("\n", "<br>")}</div>
  `;
  node.addEventListener("click", () => openDetail(d));
  wheel.appendChild(node);
});

positionNodes();
window.addEventListener("resize", positionNodes);

// Detail panel
const overlay = document.getElementById("detailOverlay");
const panel = document.getElementById("detailPanel");

function openDetail(d) {
  document.querySelectorAll(".domain-node").forEach(n => n.classList.remove("active"));
  document.getElementById(`node-${d.id}`).classList.add("active");
  document.querySelectorAll(".connector-line").forEach(l => {
    l.classList.toggle("active", l.getAttribute("data-domain") === d.id);
  });

  panel.innerHTML = `
    <button class="panel-close" onclick="closeDetail()">&times;</button>
    <div class="panel-header">
      <div class="panel-icon-wrap" style="background:${d.color}25; border: 2px solid ${d.color}">
        ${d.icon}
      </div>
      <div>
        <div class="panel-title">${d.shortName}</div>
        <div class="panel-desc">${d.description}</div>
      </div>
    </div>

    <div class="section-title">\u2705 What Good Looks Like</div>
    <div class="good-list">
      ${d.whatGoodLooksLike.map(item => `
        <div class="good-item">
          <span class="good-check">\u2713</span>
          <span>${item}</span>
        </div>
      `).join("")}
    </div>

    <div class="section-title">\u26A0\uFE0F Common Pitfalls</div>
    <div class="pitfall-list">
      ${d.commonPitfalls.map(p => `
        <div class="pitfall-item">
          <div class="pitfall-title">\u2716 ${p.title}</div>
          <div class="pitfall-desc">${p.desc}</div>
        </div>
      `).join("")}
    </div>

    <div class="section-title">\uD83D\uDCA1 Best Practices</div>
    <div class="bp-list">
      ${d.bestPractices.map(bp => `
        <div class="bp-item">
          <div class="bp-title">${bp.title}</div>
          <div class="bp-desc">${bp.desc}</div>
        </div>
      `).join("")}
    </div>

    <a href="${d.learnMore}" target="_blank" class="learn-more">
      \uD83D\uDCD6 Learn More on Microsoft Learn \u2192
    </a>
  `;

  overlay.classList.add("open");
}

function closeDetail() {
  overlay.classList.remove("open");
  document.querySelectorAll(".domain-node").forEach(n => n.classList.remove("active"));
  document.querySelectorAll(".connector-line").forEach(l => l.classList.remove("active"));
}

overlay.addEventListener("click", (e) => {
  if (e.target === overlay) closeDetail();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeDetail();
});
</script>
</body>
</html>
